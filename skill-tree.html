<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umschüler-Projekte Skill Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(100, 200, 255, 0.05) 25%, rgba(100, 200, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(100, 200, 255, 0.05) 75%, rgba(100, 200, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(100, 200, 255, 0.05) 25%, rgba(100, 200, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(100, 200, 255, 0.05) 75%, rgba(100, 200, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 40px;
            background: linear-gradient(180deg, rgba(10, 14, 39, 0.9) 0%, rgba(26, 31, 58, 0.8) 100%);
            border-bottom: 2px solid rgba(0, 255, 150, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #00ff9f, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 255, 159, 0.3);
            margin-bottom: 5px;
        }

        .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: rgba(150, 180, 255, 0.7);
            letter-spacing: 1px;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            overflow: auto;
            scroll-behavior: smooth;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .skills-container {
            position: relative;
            width: 2000px;
            height: 1400px;
            padding: 40px;
        }

        .skill-node {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
        }

        .node-content {
            width: 140px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 2px solid;
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            padding: 10px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .node-content::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.1) 50%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Tier Colors */
        .tier-0 {
            --color: #00ff9f;
            --glow: rgba(0, 255, 159, 0.5);
        }

        .tier-1 {
            --color: #00ccff;
            --glow: rgba(0, 204, 255, 0.5);
        }

        .tier-2 {
            --color: #ff00ff;
            --glow: rgba(255, 0, 255, 0.5);
        }

        .tier-3 {
            --color: #ffaa00;
            --glow: rgba(255, 170, 0, 0.5);
        }

        .node-content {
            border-color: var(--color);
            box-shadow: 0 0 15px var(--glow), inset 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .skill-node:hover .node-content {
            border-color: var(--color);
            box-shadow: 0 0 30px var(--glow), 0 0 60px var(--glow), inset 0 0 15px rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .skill-node:hover .node-content::before {
            opacity: 1;
        }

        .node-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 900;
            color: var(--color);
            margin-bottom: 5px;
            text-shadow: 0 0 10px var(--glow);
        }

        .node-title {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            color: rgba(224, 224, 224, 0.9);
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        .node-level {
            position: absolute;
            top: 5px;
            right: 8px;
            background: var(--color);
            color: #0a0e27;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            box-shadow: 0 0 10px var(--glow);
        }

        .skill-node.unlocked .node-content {
            background: rgba(10, 20, 40, 0.5);
        }

        .skill-node.locked .node-content {
            opacity: 0.4;
            border-color: rgba(100, 100, 150, 0.3);
            box-shadow: 0 0 10px rgba(100, 100, 150, 0.2);
        }

        .skill-node.locked:hover .node-content {
            opacity: 0.6;
        }

        /* Connection Lines */
        line {
            stroke-width: 2;
            stroke-opacity: 0.3;
            transition: all 0.3s ease;
        }

        .connection {
            stroke: #00ccff;
            filter: drop-shadow(0 0 8px rgba(0, 204, 255, 0.5));
        }

        .skill-node.active ~ svg .connection[data-to],
        .skill-node:hover ~ svg .connection[data-from] {
            stroke-opacity: 0.8;
            stroke-width: 3;
            filter: drop-shadow(0 0 12px rgba(0, 255, 200, 0.8));
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(10, 20, 40, 0.95);
            border: 1px solid rgba(0, 255, 159, 0.4);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            color: #e0e0e0;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
            max-width: 200px;
            box-shadow: 0 0 20px rgba(0, 255, 159, 0.2);
            backdrop-filter: blur(10px);
        }

        .tooltip.show {
            opacity: 1;
        }

        .tooltip-title {
            font-family: 'Orbitron', sans-serif;
            color: #00ff9f;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .tooltip-content {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            line-height: 1.5;
        }

        /* Legend */
        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.95), rgba(26, 31, 58, 0.95));
            border: 1px solid rgba(0, 255, 159, 0.2);
            border-radius: 8px;
            padding: 16px;
            backdrop-filter: blur(10px);
            z-index: 50;
            max-width: 250px;
        }

        .legend-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #00ff9f;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 8px;
            border: 1px solid currentColor;
        }

        .legend-item.tier-0 { color: #00ff9f; }
        .legend-item.tier-1 { color: #00ccff; }
        .legend-item.tier-2 { color: #ff00ff; }
        .legend-item.tier-3 { color: #ffaa00; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .skill-node.pulse .node-content {
            animation: pulse 2s ease-in-out;
        }

        /* Scrollbar Styling */
        .canvas-wrapper::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        .canvas-wrapper::-webkit-scrollbar-track {
            background: rgba(100, 150, 200, 0.1);
        }

        .canvas-wrapper::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00ff9f, #00ccff);
            border-radius: 10px;
            border: 2px solid rgba(10, 14, 39, 0.8);
        }

        .canvas-wrapper::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00ccff, #ff00ff);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="container">
        <header>
            <h1>⚡ SKILL TREE</h1>
            <div class="subtitle">UMSCHÜLER-PROJEKTE PROGRESSION SYSTEM</div>
        </header>

        <div class="canvas-wrapper" id="canvasWrapper">
            <div class="skills-container" id="skillsContainer">
                <svg id="connectionsSvg" style="pointer-events: none;"></svg>
                <!-- Nodes werden hier injiziert -->
            </div>
        </div>

        <div class="tooltip" id="tooltip"></div>

        <div class="legend">
            <div class="legend-title">⚙️ TIER SYSTEM</div>
            <div class="legend-item tier-0">
                <span class="legend-color" style="background: #00ff9f;"></span>
                <span>Tier 0: Foundation</span>
            </div>
            <div class="legend-item tier-1">
                <span class="legend-color" style="background: #00ccff;"></span>
                <span>Tier 1: Intermediate</span>
            </div>
            <div class="legend-item tier-2">
                <span class="legend-color" style="background: #ff00ff;"></span>
                <span>Tier 2: Advanced</span>
            </div>
            <div class="legend-item tier-3">
                <span class="legend-color" style="background: #ffaa00;"></span>
                <span>Tier 3: Master</span>
            </div>
        </div>
    </div>

    <script>
        const projects = [
            { id: 1, title: "Ubuntu Server Setup", deps: [], tier: 0, x: 100, y: 100 },
            { id: 2, title: "Linux Benutzerverwaltung", deps: [1], tier: 1, x: 400, y: 250 },
            { id: 3, title: "Netzwerk Grundlagen", deps: [1], tier: 1, x: 100, y: 350 },
            { id: 4, title: "LAMP/LEMP Stack", deps: [1], tier: 1, x: 700, y: 250 },
            { id: 5, title: "Samba NFS Freigaben", deps: [2, 3], tier: 2, x: 250, y: 550 },
            { id: 6, title: "OpenSSH VPN Setup", deps: [3], tier: 2, x: 100, y: 600 },
            { id: 7, title: "Monitoring & Logging", deps: [4], tier: 2, x: 700, y: 450 },
            { id: 8, title: "Docker Container", deps: [1], tier: 1, x: 900, y: 250 },
            { id: 9, title: "BIND DNS", deps: [3], tier: 2, x: 100, y: 850 },
            { id: 10, title: "Ansible Automatisierung", deps: [1], tier: 1, x: 1100, y: 250 },
            { id: 11, title: "FreeIPA Samba AD", deps: [2, 5], tier: 2, x: 400, y: 750 },
            { id: 12, title: "Backup & Disaster Recovery", deps: [4, 5, 10], tier: 3, x: 700, y: 900 },
            { id: 13, title: "Unternehmens-Infrastruktur", deps: [5, 9, 10, 11], tier: 3, x: 1300, y: 900 },
            { id: 14, title: "Netzwerk Virtualisierung", deps: [3, 8], tier: 2, x: 900, y: 550 },
            { id: 15, title: "Scripting Projekt", deps: [1, 10], tier: 2, x: 1100, y: 550 }
        ];

        const container = document.getElementById('skillsContainer');
        const svg = document.getElementById('connectionsSvg');
        const tooltip = document.getElementById('tooltip');
        const canvasWrapper = document.getElementById('canvasWrapper');

        // Render nodes
        projects.forEach(project => {
            const node = document.createElement('div');
            node.className = `skill-node tier-${project.tier} unlocked`;
            node.dataset.id = project.id;
            node.style.left = project.x + 'px';
            node.style.top = project.y + 'px';

            node.innerHTML = `
                <div class="node-content">
                    <div class="node-level">${project.tier + 1}</div>
                    <div class="node-number">#${String(project.id).padStart(2, '0')}</div>
                    <div class="node-title">${project.title}</div>
                </div>
            `;

            node.addEventListener('mouseenter', (e) => {
                showTooltip(e, project);
                highlightDependencies(project.id, true);
            });

            node.addEventListener('mouseleave', () => {
                hideTooltip();
                highlightDependencies(project.id, false);
            });

            container.appendChild(node);
        });

        // Draw connections
        const svgNS = "http://www.w3.org/2000/svg";
        svg.setAttribute('width', '2000');
        svg.setAttribute('height', '1400');

        projects.forEach(project => {
            project.deps.forEach(depId => {
                const depProject = projects.find(p => p.id === depId);
                if (depProject) {
                    const line = document.createElementNS(svgNS, 'line');
                    line.setAttribute('x1', depProject.x + 70);
                    line.setAttribute('y1', depProject.y + 70);
                    line.setAttribute('x2', project.x + 70);
                    line.setAttribute('y2', project.y + 70);
                    line.setAttribute('class', 'connection');
                    line.setAttribute('data-from', depId);
                    line.setAttribute('data-to', project.id);
                    svg.appendChild(line);
                }
            });
        });

        function showTooltip(e, project) {
            const deps = project.deps.length > 0
                ? 'Requires: ' + project.deps.map(id => '#' + String(id).padStart(2, '0')).join(', ')
                : 'Foundation skill';

            tooltip.innerHTML = `
                <div class="tooltip-title">${project.title}</div>
                <div class="tooltip-content">
                    <strong>Level:</strong> Tier ${project.tier + 1}<br>
                    <strong>${deps}</strong>
                </div>
            `;
            tooltip.classList.add('show');
            positionTooltip(e);
        }

        function positionTooltip(e) {
            const rect = e.target.getBoundingClientRect();
            tooltip.style.left = (rect.right + 15) + 'px';
            tooltip.style.top = (rect.top - 30) + 'px';
        }

        function hideTooltip() {
            tooltip.classList.remove('show');
        }

        function highlightDependencies(projectId, highlight) {
            const node = document.querySelector(`[data-id="${projectId}"]`);
            const project = projects.find(p => p.id === projectId);

            if (highlight) {
                node.classList.add('active');
                // Highlight dependencies
                project.deps.forEach(depId => {
                    document.querySelector(`[data-id="${depId}"]`).classList.add('pulse');
                });
            } else {
                node.classList.remove('active');
                document.querySelectorAll('.skill-node').forEach(n => n.classList.remove('pulse'));
            }
        }

        // Smooth scroll center
        window.addEventListener('load', () => {
            setTimeout(() => {
                canvasWrapper.scrollLeft = 200;
                canvasWrapper.scrollTop = 200;
            }, 100);
        });

        // Animate nodes on load
        window.addEventListener('load', () => {
            document.querySelectorAll('.skill-node').forEach((node, i) => {
                setTimeout(() => {
                    node.classList.add('pulse');
                }, i * 50);
            });
        });

        // Click to navigate to project details
        document.querySelectorAll('.skill-node').forEach(node => {
            node.addEventListener('click', () => {
                const projectId = parseInt(node.dataset.id);
                const projectLinks = {
                    1: 'projekt-01-ubuntu-server-setup.html',
                    2: 'projekt-02-linux-benutzerverwaltung.html',
                    3: 'projekt-03-netzwerk-grundlagen.html',
                    4: 'projekt-04-lamp-lemp-stack.html',
                    5: 'projekt-05-samba-nfs-freigaben.html',
                    6: 'projekt-06-openssh-vpn-setup.html',
                    7: 'projekt-07-monitoring-logging.html',
                    8: 'projekt-08-docker-container.html',
                    9: 'projekt-09-bind-dns.html',
                    10: 'projekt-10-ansible-automatisierung.html',
                    11: 'projekt-11-freeipa-samba-ad.html',
                    12: 'projekt-12-backup-disaster-recovery.html',
                    13: 'projekt-13-unternehmens-infrastruktur.html',
                    14: 'projekt-14-netzwerk-virtualisierung.html',
                    15: 'projekt-15-scripting-projekt.html'
                };
                if (projectLinks[projectId]) {
                    window.location.href = projectLinks[projectId];
                }
            });
        });
    </script>
</body>
</html>
