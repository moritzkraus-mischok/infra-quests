<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umschüler-Projekte Skill Tree</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="grid-bg"></div>

    <div class="container">
        <header>
            <h1>⚡ SKILL TREE</h1>
            <div class="subtitle">UMSCHÜLER-PROJEKTE PROGRESSION SYSTEM</div>
        </header>

        <div class="canvas-wrapper" id="canvasWrapper">
            <div class="skills-container" id="skillsContainer">
                <svg id="connectionsSvg" style="pointer-events: none;"></svg>
                <!-- Nodes werden hier injiziert -->
            </div>
        </div>

        <div class="tooltip" id="tooltip"></div>

        <div class="legend">
            <div class="legend-title">⚙️ TIER SYSTEM</div>
            <div class="legend-item tier-0">
                <span class="legend-color" style="background: #00ff9f;"></span>
                <span>Tier 0: Foundation</span>
            </div>
            <div class="legend-item tier-1">
                <span class="legend-color" style="background: #00ccff;"></span>
                <span>Tier 1: Intermediate</span>
            </div>
            <div class="legend-item tier-2">
                <span class="legend-color" style="background: #ff00ff;"></span>
                <span>Tier 2: Advanced</span>
            </div>
            <div class="legend-item tier-3">
                <span class="legend-color" style="background: #ffaa00;"></span>
                <span>Tier 3: Master</span>
            </div>

            <div style="border-top: 1px solid rgba(0, 255, 159, 0.2); margin: 12px 0; padding-top: 12px;">
                <div class="legend-title">📊 STATUS</div>
                <div class="legend-item" style="color: #e0e0e0;">
                    <span style="font-size: 16px; margin-right: 8px;">⭕</span>
                    <span>Not Started</span>
                </div>
                <div class="legend-item" style="color: #e0e0e0;">
                    <span style="font-size: 16px; margin-right: 8px;">🔄</span>
                    <span>In Progress</span>
                </div>
                <div class="legend-item" style="color: #e0e0e0;">
                    <span style="font-size: 16px; margin-right: 8px;">✅</span>
                    <span>Completed</span>
                </div>
                <div class="legend-item" style="color: #96b4ff; font-size: 10px; margin-top: 8px;">
                    <span>💡 Click icon to toggle</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const projects = [
            { id: 1, title: "Ubuntu Server Setup", description: "Grundlegende Installation und Konfiguration eines Ubuntu-Servers", deps: [], tier: 0, x: 380, y: 80 },
            { id: 2, title: "Linux Benutzerverwaltung", description: "Verwaltung von Benutzerkonten, Gruppen und Zugriffsberechtigung", deps: [1], tier: 1, x: 40, y: 340 },
            { id: 3, title: "Netzwerk Grundlagen", description: "Netzwerkkonfiguration, IP-Adressen und grundlegende Routing-Konzepte", deps: [1], tier: 1, x: 240, y: 340 },
            { id: 4, title: "LAMP/LEMP Stack", description: "Webserver mit Apache/Nginx, PHP und MySQL/MariaDB einrichten", deps: [1], tier: 1, x: 440, y: 340 },
            { id: 5, title: "Samba NFS Freigaben", description: "Netzwerkfreigaben und Dateisystem-Verwaltung im lokalen Netz", deps: [2, 3], tier: 2, x: 40, y: 600 },
            { id: 6, title: "OpenSSH VPN Setup", description: "Sichere Remote-Verbindungen und Virtual Private Network Konfiguration", deps: [3], tier: 2, x: 240, y: 600 },
            { id: 7, title: "Monitoring & Logging", description: "Systemüberwachung, Performance-Analyse und zentrale Log-Verwaltung", deps: [4], tier: 2, x: 440, y: 600 },
            { id: 8, title: "Docker Container", description: "Containerisierung von Anwendungen und Microservices mit Docker", deps: [1], tier: 1, x: 640, y: 340 },
            { id: 9, title: "BIND DNS", description: "Aufbau und Betrieb eines DNS-Servers mit BIND", deps: [3], tier: 2, x: 640, y: 600 },
            { id: 10, title: "Ansible Automatisierung", description: "Automatisierung von IT-Infrastruktur und Konfigurationsverwaltung", deps: [1], tier: 1, x: 840, y: 340 },
            { id: 11, title: "FreeIPA Samba AD", description: "Zentralisierte Identitätsverwaltung und Active Directory Integration", deps: [2, 5], tier: 2, x: 840, y: 600 },
            { id: 12, title: "Backup & Disaster Recovery", description: "Backup-Strategien, Wiederherstellung und Business Continuity Planning", deps: [4, 5, 10], tier: 3, x: 240, y: 1160 },
            { id: 13, title: "Unternehmens-Infrastruktur", description: "Integrierte IT-Infrastruktur-Lösung für produktive Unternehmensumgebungen", deps: [5, 9, 10, 11], tier: 3, x: 440, y: 1160 },
            { id: 14, title: "Netzwerk Virtualisierung", description: "Virtuelle Netzwerke, Bridging und erweiterte Netzwerk-Management-Techniken", deps: [3, 8], tier: 2, x: 240, y: 880 },
            { id: 15, title: "Scripting Projekt", description: "Automatisierung durch Shell-Scripting und Python-Programmierung", deps: [1, 10], tier: 2, x: 440, y: 880 }
        ];

        const container = document.getElementById('skillsContainer');
        const svg = document.getElementById('connectionsSvg');
        const tooltip = document.getElementById('tooltip');
        const canvasWrapper = document.getElementById('canvasWrapper');

        // Adjust canvas size for grid layout
        container.style.width = '1000px';
        container.style.height = '1400px';

        // Render nodes
        projects.forEach(project => {
            const node = document.createElement('div');
            node.className = `skill-node tier-${project.tier} unlocked`;
            node.dataset.id = project.id;
            node.style.left = project.x + 'px';
            node.style.top = project.y + 'px';

            node.innerHTML = `
                <div class="node-content">
                    <div class="node-level">${project.tier + 1}</div>
                    <div class="node-number">#${String(project.id).padStart(2, '0')}</div>
                    <div class="node-title">${project.title}</div>
                </div>
            `;

            node.addEventListener('mouseenter', (e) => {
                showTooltip(e, project);
                highlightDependencies(project.id, true);
            });

            node.addEventListener('mouseleave', () => {
                hideTooltip();
                highlightDependencies(project.id, false);
            });

            container.appendChild(node);
        });

        // Draw connections
        const svgNS = "http://www.w3.org/2000/svg";
        svg.setAttribute('width', '1000');
        svg.setAttribute('height', '1400');

        projects.forEach(project => {
            project.deps.forEach(depId => {
                const depProject = projects.find(p => p.id === depId);
                if (depProject) {
                    const line = document.createElementNS(svgNS, 'line');
                    line.setAttribute('x1', depProject.x + 70);
                    line.setAttribute('y1', depProject.y + 70);
                    line.setAttribute('x2', project.x + 70);
                    line.setAttribute('y2', project.y + 70);
                    line.setAttribute('class', 'connection');
                    line.setAttribute('data-from', depId);
                    line.setAttribute('data-to', project.id);

                    // Curved path for better visualization
                    const midX = (depProject.x + project.x) / 2;
                    const midY = (depProject.y + project.y) / 2 + 40;
                    const pathData = `M ${depProject.x + 70} ${depProject.y + 70} Q ${midX} ${midY} ${project.x + 70} ${project.y + 70}`;

                    const path = document.createElementNS(svgNS, 'path');
                    path.setAttribute('d', pathData);
                    path.setAttribute('class', 'connection');
                    path.setAttribute('data-from', depId);
                    path.setAttribute('data-to', project.id);
                    svg.appendChild(path);
                }
            });
        });

        function showTooltip(e, project) {
            const deps = project.deps.length > 0
                ? 'Requires: ' + project.deps.map(id => '#' + String(id).padStart(2, '0')).join(', ')
                : 'Foundation skill';

            tooltip.innerHTML = `
                <div class="tooltip-title">${project.title}</div>
                <div class="tooltip-content">
                    <p style="margin: 8px 0 12px 0; font-size: 13px; color: #b0b0b0;">${project.description}</p>
                    <strong>Level:</strong> Tier ${project.tier + 1}<br>
                    <strong>${deps}</strong>
                </div>
            `;
            tooltip.classList.add('show');
            positionTooltip(e);
        }

        function positionTooltip(e) {
            const rect = e.target.getBoundingClientRect();
            tooltip.style.left = (rect.right + 15) + 'px';
            tooltip.style.top = (rect.top - 30) + 'px';
        }

        function hideTooltip() {
            tooltip.classList.remove('show');
        }

        function highlightDependencies(projectId, highlight) {
            const node = document.querySelector(`[data-id="${projectId}"]`);
            const project = projects.find(p => p.id === projectId);

            if (highlight) {
                node.classList.add('active');
                // Highlight dependencies
                project.deps.forEach(depId => {
                    document.querySelector(`[data-id="${depId}"]`).classList.add('pulse');
                });
            } else {
                node.classList.remove('active');
                document.querySelectorAll('.skill-node').forEach(n => n.classList.remove('pulse'));
            }
        }

        // Smooth scroll center
        window.addEventListener('load', () => {
            setTimeout(() => {
                canvasWrapper.scrollLeft = 200;
                canvasWrapper.scrollTop = 200;
            }, 100);
        });

        // Animate nodes on load
        window.addEventListener('load', () => {
            document.querySelectorAll('.skill-node').forEach((node, i) => {
                setTimeout(() => {
                    node.classList.add('pulse');
                }, i * 50);
            });
        });

        // Initialize status icons and storage
        function initializeStatusIcons() {
            const statuses = JSON.parse(localStorage.getItem('skillTreeStatuses') || '{}');

            document.querySelectorAll('.skill-node').forEach(node => {
                const projectId = parseInt(node.dataset.id);
                const status = statuses[projectId] || 'not-started';

                const statusIcon = document.createElement('div');
                statusIcon.className = `status-icon ${status}`;
                statusIcon.dataset.projectId = projectId;
                node.appendChild(statusIcon);

                statusIcon.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleStatus(projectId, statusIcon);
                });
            });
        }

        function toggleStatus(projectId, iconElement) {
            const statuses = JSON.parse(localStorage.getItem('skillTreeStatuses') || '{}');
            const currentStatus = statuses[projectId] || 'not-started';

            const statusCycle = ['not-started', 'started', 'completed'];
            const currentIndex = statusCycle.indexOf(currentStatus);
            const newStatus = statusCycle[(currentIndex + 1) % statusCycle.length];

            statuses[projectId] = newStatus;
            localStorage.setItem('skillTreeStatuses', JSON.stringify(statuses));

            iconElement.className = `status-icon ${newStatus}`;
            iconElement.dataset.status = newStatus;
        }

        // Initialize status icons on load
        window.addEventListener('load', () => {
            initializeStatusIcons();
        });

        // Click to navigate to project details
        document.querySelectorAll('.skill-node').forEach(node => {
            node.addEventListener('click', (e) => {
                const projectId = parseInt(node.dataset.id);
                const projectLinks = {
                    1: 'projekte/projekt-01-ubuntu-server-setup.html',
                    2: 'projekte/projekt-02-linux-benutzerverwaltung.html',
                    3: 'projekte/projekt-03-netzwerk-grundlagen.html',
                    4: 'projekte/projekt-04-lamp-lemp-stack.html',
                    5: 'projekte/projekt-05-samba-nfs-freigaben.html',
                    6: 'projekte/projekt-06-openssh-vpn-setup.html',
                    7: 'projekte/projekt-07-monitoring-logging.html',
                    8: 'projekte/projekt-08-docker-container.html',
                    9: 'projekte/projekt-09-bind-dns.html',
                    10: 'projekte/projekt-10-ansible-automatisierung.html',
                    11: 'projekte/projekt-11-freeipa-samba-ad.html',
                    12: 'projekte/projekt-12-backup-disaster-recovery.html',
                    13: 'projekte/projekt-13-unternehmens-infrastruktur.html',
                    14: 'projekte/projekt-14-netzwerk-virtualisierung.html',
                    15: 'projekte/projekt-15-scripting-projekt.html'
                };
                if (projectLinks[projectId]) {
                    window.location.href = projectLinks[projectId];
                }
            });
        });
    </script>
</body>
</html>
